
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Password@2025}
      POSTGRES_DB: ${DB_NAME:-birthday_reminder}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-Password@2025}
      DB_HOST: postgres          # service name
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-birthday_reminder}
      REDIS_URL: redis://redis:6379
      APP_BASE_URL: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET}
      BCRYPT_SALT_ROUNDS: 10
      PORT: 3000
      # Email env vars – add real ones later:
      # BREVO_HOST: ${BREVO_HOST}
      # BREVO_PORT: ${BREVO_PORT}
      # BREVO_USER: ${BREVO_USER}
      # BREVO_PASS: ${BREVO_PASS}
      # EMAIL_FROM: ${EMAIL_FROM}
    volumes:
      - ./src:/app/src           # live reload (optional)
      - /app/node_modules

volumes:
  pgdata: